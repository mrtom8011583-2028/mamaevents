name: mama_events
description: "Premium event management and catering services for Pakistan."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_database: ^12.1.1
  firebase_auth: ^6.1.3
  firebase_storage: ^13.0.5
  cloud_firestore: ^6.1.1
  firebase_messaging: ^16.1.0
  firebase_analytics: ^12.1.0

  # State Management
  provider: ^6.1.1
  get: ^4.6.6

  # UI & Animations
  google_fonts: ^6.1.0
  lottie: ^3.0.0
  animated_text_kit: ^4.2.2
  flutter_staggered_animations: ^1.1.1
  visibility_detector: ^0.4.0
  shimmer: ^3.0.0
  marquee: ^2.2.3

  # Media
  video_player: ^2.8.1
  chewie: ^1.7.5
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  image_picker: ^1.0.7
  file_picker: ^10.3.8

  # Navigation
  go_router: ^17.0.1

  # HTTP & API
  dio: ^5.4.0
  http: ^1.2.0

  # Utilities
  intl: ^0.20.2
  url_launcher: ^6.2.2
  geolocator: ^14.0.2
  flutter_dotenv: ^6.0.0
  connectivity_plus: ^7.0.0
  shared_preferences: ^2.2.2
  universal_html: ^2.2.4

  # Icons
  font_awesome_flutter: ^10.12.0
  cupertino_icons: ^1.0.8

  # Forms
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Grid & Calendar
  flutter_staggered_grid_view: ^0.7.0
  table_calendar: ^3.0.9

  # Auth
  google_sign_in: ^7.2.0
  flutter_image_compress: ^2.4.0
  printing: ^5.14.2
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - lib/assets/videos/
    - assets/images/
    - assets/images/services/
    - assets/images/gallery/
    - assets/images/events/
    - assets/lottie/
    - .env

  # Fonts - Using google_fonts package for Playfair Display and Inter
  # If you want to use local fonts, download them to assets/fonts/ and uncomment:
  # fonts:
  #   - family: Playfair Display
  #     fonts:
  #       - asset: assets/fonts/PlayfairDisplay-Regular.ttf
  #       - asset: assets/fonts/PlayfairDisplay-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/PlayfairDisplay-Bold.ttf
  #         weight: 700
  #
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700