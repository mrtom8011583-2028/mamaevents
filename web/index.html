<!DOCTYPE html>
<html lang="en">

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta Tags -->
  <title>MAMA Events | Premier Catering &amp; Event Planners in Pakistan</title>
  <meta name="title" content="MAMA Events | Premier Catering &amp; Event Planners in Pakistan">
  <meta name="description"
    content="Expert event management and premium catering services for weddings, corporate events, and exhibitions in Gujranwala and across Pakistan. Book your consultation today.">
  <meta name="keywords"
    content="catering, event planning, wedding planner, corporate events, exhibitions, Gujranwala, Pakistan, MAMA events">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mamaevents.pk/">
  <meta property="og:title" content="MAMA Events - Making Your Moments Memorable">
  <meta property="og:description" content="Top-tier catering and event management services in Pakistan.">
  <meta property="og:image" content="https://mamaevents.pk/logo.png">

  <!-- Canonical URL -->
  <link rel="canonical" href="https://mamaevents.pk/">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://mamaevents.pk/">
  <meta property="twitter:title" content="MAMA Events - Making Your Moments Memorable">
  <meta property="twitter:description" content="Top-tier catering and event management services in Pakistan.">
  <meta property="twitter:image" content="https://mamaevents.pk/logo.png">

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "LocalBusiness",
    "name": "MAMA Events & Exhibitions",
    "image": "https://mamaevents.pk/logo.png",
    "url": "https://mamaevents.pk/",
    "telephone": "+923051340042",
    "address": {
      "@type": "PostalAddress",
      "addressLocality": "Gujranwala",
      "addressCountry": "PK"
    },
    "description": "Expert event management and premium catering services for weddings, corporate events, and exhibitions in Gujranwala and across Pakistan."
  }
  </script>

  <!-- Preconnect to improve performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- DNS Prefetch -->
  <link rel="dns-prefetch" href="https://fonts.googleapis.com">
  <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- ═══════════════════════════════════════════════════
       INSTANT LOADING SCREEN — shows before Flutter boots
       ═══════════════════════════════════════════════════ -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d0d;
      font-family: 'Georgia', serif;
    }

    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* MM Logo Mark */
    .logo-mark {
      width: 80px;
      height: 80px;
      border: 2px solid #D4AF37;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-border 2s ease-in-out infinite;
    }

    .logo-mark span {
      color: #D4AF37;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -2px;
      font-family: 'Georgia', serif;
    }

    @keyframes pulse-border {

      0%,
      100% {
        border-color: #D4AF37;
        box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.4);
      }

      50% {
        border-color: #f0cc5a;
        box-shadow: 0 0 0 8px rgba(212, 175, 55, 0);
      }
    }

    /* Brand Name */
    .brand-name {
      color: #ffffff;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 6px;
      text-transform: uppercase;
    }

    .brand-tagline {
      color: #D4AF37;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* Gold progress bar */
    .progress-bar-wrap {
      width: 160px;
      height: 2px;
      background: rgba(212, 175, 55, 0.2);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #D4AF37, #f0cc5a);
      border-radius: 2px;
      animation: load-progress 2.5s ease-in-out infinite;
    }

    @keyframes load-progress {
      0% {
        width: 0%;
        transform: translateX(0);
      }

      50% {
        width: 100%;
        transform: translateX(0);
      }

      100% {
        width: 100%;
        transform: translateX(100%);
      }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN — visible instantly, removed by Flutter -->
  <div id="loading-screen">
    <div class="logo-mark"><span>MM</span></div>
    <div style="text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px;">
      <div class="brand-name">MAMA Events</div>
      <div class="brand-tagline">Complete Event Solutions</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar"></div>
    </div>
  </div>

  <script>
    // Remove loading screen as soon as Flutter renders first frame
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-screen');
      if (loader) {
        loader.classList.add('hidden');
        // Fully remove from DOM after fade transition
        setTimeout(function () { loader.remove(); }, 550);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
